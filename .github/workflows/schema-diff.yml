name: Schema Diff Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "schemawatch/**"
      - "tests/**"
      - "examples/**"
      - "openapi.yaml"
      - "openapi_old.yaml"
      - "pyproject.toml"
      - "requirements.txt"

jobs:
  schema-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run real schema diff
        run: python -m schemawatch.cli openapi_old.yaml openapi.yaml