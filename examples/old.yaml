openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0

paths:
  /users:
    get:
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
    post:
      responses:
        "201":
          description: User created

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string