openapi: 3.0.0
info:
  title: SchemaWatch Example API
  version: 1.0.0

paths:
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /orders:
    post:
      summary: Create order
      responses:
        "201":
          description: Order created

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
      required:
        - name