openapi: 3.0.0
info:
  title: SchemaWatch Example API
  version: 2.0.0

paths:
  /users:
    post:
      summary: Create user
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name